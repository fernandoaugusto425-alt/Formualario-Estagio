<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário Alunos Técnico</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }
    .school-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #f97316 100%);
    }
    .animate-pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="antialiased font-sans school-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Ícones
    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconBuilding = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [formData, setFormData] = useState({
        nome: '', cpf: '', ra: '', ano: '', curso: '', 
        interesse: '', codigoCiee: '',
        empresasRank: [], prefeituraRank: [], treloRank: []
      });

      // Opções
      const todasEmpresas = [
        { id: 'prefeitura', label: 'Prefeitura' },
        { id: 'trelo', label: 'Trelo' },
        { id: 'tonho', label: 'Tonho Móveis' },
        { id: 'sicoob', label: 'Sicoob' }
      ];

      const areasPrefeitura = [
        { id: 'juridico', label: 'Jurídico' }, { id: 'saude', label: 'Saúde' },
        { id: 'esporte', label: 'Esporte' }, { id: 'educacao', label: 'Educação' },
        { id: 'social', label: 'Social' }
      ];

      const areasTrelo = [
        { id: 'marketing', label: 'Marketing' }, { id: 'v_merch', label: 'Visual Merch.' },
        { id: 'adm', label: 'Administrativo' }, { id: 'logistica', label: 'Logística' }
      ];

      const handleRanking = (listName, id, max) => {
        let current = [...formData[listName]];
        if (current.includes(id)) {
          current = current.filter(i => i !== id);
        } else if (current.length < max) {
          current.push(id);
        }
        setFormData({...formData, [listName]: current});
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center animate-pop border-t-8 border-orange-500">
              <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
              </div>
              <h2 className="text-3xl font-black text-slate-800 mb-2 uppercase">Enviado!</h2>
              <p className="text-slate-600 mb-8 text-lg">Obrigado, {formData.nome.split(' ')[0]}! O teu questionário foi registado com sucesso.</p>
              <button onClick={() => window.location.reload()} className="w-full py-4 bg-orange-600 hover:bg-orange-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95 uppercase">Voltar</button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-12 px-4">
          <div className="max-w-3xl mx-auto">
            
            {/* CABEÇALHO */}
            <div className="text-center mb-10">
              <div className="inline-block p-2 bg-white rounded-full shadow-2xl mb-6 border-4 border-white/20 overflow-hidden">
                <img 
                  src="./logo.png" 
                  alt="Logo Escola" 
                  className="w-32 h-32 object-contain rounded-full"
                  onError={(e) => { e.target.src = 'https://via.placeholder.com/150?text=LOGO+ESCOLA'; }}
                />
              </div>
              <h1 className="text-3xl sm:text-4xl font-black text-white uppercase tracking-tighter drop-shadow-xl mb-2">Questionário Alunos Técnico</h1>
              <p className="text-blue-50 font-bold opacity-90 mt-2 tracking-wide italic">Coronel Castanho de Almeida • 2026</p>
            </div>

            <form onSubmit={(e) => { e.preventDefault(); setIsSubmitted(true); }} className="glass-effect space-y-10 rounded-[2.5rem] p-6 sm:p-12 shadow-2xl border border-white/20">
              
              {/* 1. DADOS PESSOAIS */}
              <div className="space-y-6">
                <h2 className="text-xl font-black text-slate-800 uppercase flex items-center border-b pb-3">
                  <span className="text-orange-500 mr-2 bg-orange-50 p-2 rounded-lg"><IconUser /></span> 1. Identificação
                </h2>
                <input type="text" placeholder="Nome Completo" required className="w-full p-4 rounded-2xl border-2 focus:border-blue-500 outline-none bg-slate-50/50 font-medium" onChange={e => setFormData({...formData, nome: e.target.value})} />
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <input type="text" placeholder="CPF" required className="p-4 rounded-2xl border-2 outline-none bg-slate-50/50" onChange={e => setFormData({...formData, cpf: e.target.value})} />
                  <input type="text" placeholder="RA" required className="p-4 rounded-2xl border-2 outline-none bg-slate-50/50" onChange={e => setFormData({...formData, ra: e.target.value})} />
                </div>
              </div>

              {/* 2. CURSO E ANO */}
              <div className="space-y-6">
                <h3 className="font-black text-slate-400 text-xs uppercase tracking-widest text-center">Ano e Curso Técnico</h3>
                <div className="grid grid-cols-2 gap-4 text-center">
                  {['2º Ano', '3º Ano'].map(a => (
                    <label key={a} className={`p-4 border-2 rounded-2xl cursor-pointer font-black transition-all ${formData.ano === a ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white text-slate-300'}`}>
                      <input type="radio" name="ano" className="sr-only" required onChange={() => setFormData({...formData, ano: a})} /> {a}
                    </label>
                  ))}
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <label className={`p-6 border-2 rounded-3xl cursor-pointer text-center transition-all ${formData.curso === 'ADM' ? 'bg-blue-600 border-blue-600 text-white shadow-xl scale-105' : 'bg-white text-slate-400 hover:border-blue-300'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'ADM', empresasRank: []})} />
                    <div className="font-black text-xl">Administração</div>
                  </label>
                  <label className={`p-6 border-2 rounded-3xl cursor-pointer text-center transition-all ${formData.curso === 'AGRO' ? 'bg-orange-600 border-orange-600 text-white shadow-xl scale-105' : 'bg-white text-slate-400 hover:border-orange-300'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'AGRO', empresasRank: ['prefeitura']})} />
                    <div className="font-black text-xl">Agronegócio</div>
                  </label>
                </div>
              </div>

              {/* 3. OPÇÃO DE ESTÁGIO */}
              <div className="space-y-6">
                <h2 className="text-xl font-black text-slate-800 uppercase flex items-center border-b pb-3">
                  <span className="text-orange-500 mr-2 bg-orange-50 p-2 rounded-lg"><IconBriefcase /></span> 2. Estágio
                </h2>
                <div className="flex gap-4">
                  {['SIM', 'NÃO'].map(opt => (
                    <label key={opt} className={`flex-1 p-4 border-2 rounded-2xl cursor-pointer text-center font-bold transition-all ${formData.interesse === opt ? 'bg-slate-800 border-slate-800 text-white' : 'bg-white text-slate-300'}`}>
                      <input type="radio" name="interesse" className="sr-only" required onChange={() => setFormData({...formData, interesse: opt})} /> {opt}
                    </label>
                  ))}
                </div>
              </div>

              {/* CONTEÚDO CONDICIONAL DE ESTÁGIO */}
              {formData.interesse === 'SIM' && (
                <div className="space-y-10 animate-pop">
                  
                  {/* CÓDIGO CIEE */}
                  <div className="bg-blue-50/50 p-6 rounded-3xl border-2 border-blue-100">
                    <label className="block text-xs font-black text-blue-900 mb-2 uppercase tracking-widest text-center">Código de Cadastro CIEE</label>
                    <input type="text" placeholder="Insira o seu código CIEE" required className="w-full p-4 rounded-xl border-2 border-white outline-none focus:border-blue-500 font-bold text-center" onChange={e => setFormData({...formData, codigoCiee: e.target.value})} />
                  </div>

                  {/* RANKING EMPRESAS */}
                  <div className="space-y-6">
                    <h3 className="font-black text-slate-700 uppercase flex items-center tracking-tight">
                       <span className="text-blue-600 mr-2"><IconBuilding /></span> 3. Prioridade de Empresa
                    </h3>
                    
                    {formData.curso === 'AGRO' ? (
                      <div className="p-6 bg-green-50 border-2 border-green-200 rounded-2xl text-green-800 font-bold text-center">
                        Para o curso de Agronegócio, a empresa disponível é a Prefeitura.
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        {todasEmpresas.map(emp => {
                          const rank = formData.empresasRank.indexOf(emp.id);
                          return (
                            <div key={emp.id} onClick={() => handleRanking('empresasRank', emp.id, 3)} className={`relative p-5 border-2 rounded-2xl cursor-pointer text-center font-bold transition-all ${rank !== -1 ? 'border-orange-500 bg-orange-50 text-orange-900 shadow-md transform scale-105' : 'bg-white text-slate-300'}`}>
                              {rank !== -1 && <span className="absolute -top-3 -right-3 bg-orange-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg animate-bounce">{rank + 1}º</span>}
                              {emp.label}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* SETORES (APENAS PARA ADM) */}
                  {formData.curso === 'ADM' && formData.empresasRank.includes('prefeitura') && (
                    <div className="p-8 bg-slate-50 rounded-[2rem] border-2 border-slate-100 space-y-4 shadow-inner">
                      <p className="font-black text-slate-500 uppercase text-xs tracking-widest text-center">Setores da Prefeitura (Escolha 2)</p>
                      <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
                        {areasPrefeitura.map(a => {
                          const rank = formData.prefeituraRank.indexOf(a.id);
                          return (
                            <div key={a.id} onClick={() => handleRanking('prefeituraRank', a.id, 2)} className={`relative p-3 border-2 rounded-xl cursor-pointer text-center text-[10px] font-black transition-all ${rank !== -1 ? 'border-blue-500 bg-blue-50 text-blue-900' : 'bg-white border-white text-slate-300'}`}>
                              {rank !== -1 && <span className="absolute -top-1 -right-1 bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[8px]">{rank + 1}º</span>}
                              {a.label}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {formData.curso === 'ADM' && formData.empresasRank.includes('trelo') && (
                    <div className="p-8 bg-slate-50 rounded-[2rem] border-2 border-slate-100 space-y-4 shadow-inner">
                      <p className="font-black text-slate-500 uppercase text-xs tracking-widest text-center">Setores da Trelo (Escolha 2)</p>
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                        {areasTrelo.map(a => {
                          const rank = formData.treloRank.indexOf(a.id);
                          return (
                            <div key={a.id} onClick={() => handleRanking('treloRank', a.id, 2)} className={`relative p-3 border-2 rounded-xl cursor-pointer text-center text-[10px] font-black transition-all ${rank !== -1 ? 'border-blue-500 bg-blue-50 text-blue-900' : 'bg-white border-white text-slate-300'}`}>
                              {rank !== -1 && <span className="absolute -top-1 -right-1 bg-blue-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[8px]">{rank + 1}º</span>}
                              {a.label}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              <button type="submit" className="w-full py-6 bg-orange-600 hover:bg-orange-700 text-white text-2xl font-black rounded-[2rem] transition-all shadow-xl shadow-orange-600/30 active:scale-95 uppercase tracking-widest">
                Enviar Questionário
              </button>
            </form>
            
            <p className="text-center text-white/50 text-xs mt-8 font-medium tracking-widest uppercase">&copy; 2026 Escola Coronel Castanho de Almeida</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
