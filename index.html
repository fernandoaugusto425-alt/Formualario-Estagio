<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programa de Estágio 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 antialiased text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Ícones SVG
    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconBuilding = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const IconCheck = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconChevron = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconSend = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
    const IconAlert = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconLoader = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const IconMapPin = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [formData, setFormData] = useState({
        nome: '',
        email: '',
        telefone: '',
        cpf: '',
        ra: '',
        interesseEstagio: '',
        codigoCiee: '',
        empresa1: '',
        empresa2: '',
        empresa3: '',
        prefeituraArea1: '',
        prefeituraArea2: '',
        treloArea1: '',
        treloArea2: ''
      });

      // Opções disponíveis
      const empresasDisponiveis = [
        { id: 'prefeitura', label: 'Prefeitura' },
        { id: 'trelo', label: 'Trelo' },
        { id: 'tonho', label: 'Tonho Móveis' },
        { id: 'sicoob', label: 'Sicoob' }
      ];

      const areasPrefeitura = [
        { id: 'juridico', label: 'Jurídico' },
        { id: 'saude', label: 'Saúde' },
        { id: 'esporte', label: 'Esporte' },
        { id: 'educacao', label: 'Educação' },
        { id: 'social', label: 'Social' }
      ];

      const areasTrelo = [
        { id: 'marketing', label: 'Marketing' },
        { id: 'visual_merchandising', label: 'Visual Merchandising' },
        { id: 'administrativo', label: 'Administrativo' },
        { id: 'logistico', label: 'Logístico' }
      ];

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => {
          const newData = { ...prev, [name]: value };
          
          // Se mudar de ideia e não quiser estagiar, limpa os campos de estágio
          if (name === 'interesseEstagio' && value === 'nao') {
            newData.codigoCiee = '';
            newData.empresa1 = ''; newData.empresa2 = ''; newData.empresa3 = '';
            newData.prefeituraArea1 = ''; newData.prefeituraArea2 = '';
            newData.treloArea1 = ''; newData.treloArea2 = '';
          }
          return newData;
        });
      };

      // Verifica as empresas selecionadas para mostrar as áreas específicas
      const empresasSelecionadas = [formData.empresa1, formData.empresa2, formData.empresa3];
      const selecionouPrefeitura = empresasSelecionadas.includes('prefeitura');
      const selecionouTrelo = empresasSelecionadas.includes('trelo');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSaving(true);
        
        try {
          // =========================================================
          // SE TIVER O LINK DO FORMSPREE, COLE AQUI ENTRE AS ASPAS SIMPLES
          const FORMSPREE_URL = 'COLE_AQUI_O_SEU_LINK_DO_FORMSPREE'; 
          // =========================================================
          
          if(FORMSPREE_URL === 'COLE_AQUI_O_SEU_LINK_DO_FORMSPREE') {
            await new Promise(resolve => setTimeout(resolve, 1500)); 
            console.log('Dados submetidos (Modo Simulação):', formData);
            setIsSubmitted(true);
            setIsSaving(false);
            return;
          }

          const response = await fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(formData)
          });

          if (response.ok) {
            setIsSubmitted(true);
          } else {
            alert("Ocorreu um erro ao enviar. Por favor, tente novamente.");
          }
        } catch (err) {
          console.error("Erro", err);
          alert("Erro de conexão. Verifique a internet e tente novamente.");
        } finally {
          setIsSaving(false);
        }
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6">
              <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-green-600">
                <IconCheck />
              </div>
              <h2 className="text-2xl font-bold text-slate-800">Formulário Enviado!</h2>
              <p className="text-slate-600">Muito obrigado, {formData.nome.split(' ')[0]}! Seus dados e preferências de estágio foram registrados com sucesso.</p>
              <button onClick={() => window.location.reload()} className="mt-6 w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-md">
                Enviar nova resposta
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-2xl mx-auto">
            <div className="mb-8 text-center">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4 shadow-sm">
                <IconBriefcase />
              </div>
              <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Programa de Estágio</h1>
              <p className="mt-2 text-lg text-slate-600">Preencha seus dados para mapearmos as melhores oportunidades.</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-8 bg-white shadow-xl rounded-3xl p-6 sm:p-10 border border-slate-100">
              
              {/* DADOS PESSOAIS */}
              <div className="space-y-6">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-blue-600 mr-3"><IconUser /></div>
                  <h2 className="text-xl font-semibold text-slate-800">1. Dados Pessoais</h2>
                </div>
                
                <div className="grid grid-cols-1 gap-6 sm:grid-cols-2">
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Nome Completo *</label>
                    <input type="text" name="nome" required value={formData.nome} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Ex: João da Silva"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">E-mail *</label>
                    <input type="email" name="email" required value={formData.email} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="joao@email.com"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Telefone / WhatsApp *</label>
                    <input type="tel" name="telefone" required value={formData.telefone} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="(00) 00000-0000"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">CPF *</label>
                    <input type="text" name="cpf" required value={formData.cpf} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="000.000.000-00"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">RA (Registro Acadêmico) *</label>
                    <input type="text" name="ra" required value={formData.ra} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Seu número de RA"/>
                  </div>
                </div>
              </div>

              {/* INTERESSE EM ESTÁGIO */}
              <div className="space-y-6 pt-4">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-blue-600 mr-3"><IconBriefcase /></div>
                  <h2 className="text-xl font-semibold text-slate-800">2. Interesse em Estágio</h2>
                </div>
                <div>
                  <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'sim' ? 'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                      <input type="radio" name="interesseEstagio" value="sim" required checked={formData.interesseEstagio === 'sim'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Sim, tenho interesse</span>
                    </label>
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'nao' ? 'bg-slate-100 border-slate-500 text-slate-800 ring-2 ring-slate-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                      <input type="radio" name="interesseEstagio" value="nao" required checked={formData.interesseEstagio === 'nao'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Não no momento</span>
                    </label>
                  </div>
                </div>
              </div>

              {/* DADOS COMPLEMENTARES (Aparece só se "Sim") */}
              {formData.interesseEstagio === 'sim' && (
                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  
                  {/* CÓDIGO CIEE */}
                  <div className="bg-blue-50/50 p-6 rounded-2xl border border-blue-100">
                    <label className="block text-sm font-semibold text-blue-900 mb-2">Código CIEE *</label>
                    <p className="text-xs text-blue-700 mb-3">Como você tem interesse em estagiar, precisamos do seu código CIEE.</p>
                    <div className="relative">
                      <input type="text" name="codigoCiee" required={formData.interesseEstagio === 'sim'} value={formData.codigoCiee} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Digite seu número do CIEE"/>
                      <div className="absolute right-3 top-3.5 text-slate-400"><IconAlert /></div>
                    </div>
                  </div>

                  {/* PRIORIDADE DE EMPRESAS */}
                  <div className="space-y-4">
                    <div className="flex items-center border-b border-slate-200 pb-3">
                      <div className="text-blue-600 mr-3"><IconBuilding /></div>
                      <h2 className="text-xl font-semibold text-slate-800">3. Prioridade de Empresas</h2>
                    </div>
                    <p className="text-sm text-slate-600 mb-4">Escolha a sua ordem de preferência. Não precisa preencher todas se não quiser.</p>
                    
                    <div className="grid gap-4 sm:grid-cols-3">
                      {/* 1ª Opção */}
                      <div className="space-y-1">
                        <label className="block text-sm font-medium text-slate-700">1ª Opção *</label>
                        <select name="empresa1" required={formData.interesseEstagio === 'sim'} value={formData.empresa1} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                          <option value="">Selecione...</option>
                          {empresasDisponiveis.map(emp => (
                            <option key={emp.id} value={emp.id} disabled={formData.empresa2 === emp.id || formData.empresa3 === emp.id}>{emp.label}</option>
                          ))}
                        </select>
                      </div>
                      
                      {/* 2ª Opção */}
                      <div className="space-y-1">
                        <label className="block text-sm font-medium text-slate-700">2ª Opção</label>
                        <select name="empresa2" value={formData.empresa2} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white" disabled={!formData.empresa1}>
                          <option value="">Selecione...</option>
                          {empresasDisponiveis.map(emp => (
                            <option key={emp.id} value={emp.id} disabled={formData.empresa1 === emp.id || formData.empresa3 === emp.id}>{emp.label}</option>
                          ))}
                        </select>
                      </div>

                      {/* 3ª Opção */}
                      <div className="space-y-1">
                        <label className="block text-sm font-medium text-slate-700">3ª Opção</label>
                        <select name="empresa3" value={formData.empresa3} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white" disabled={!formData.empresa2}>
                          <option value="">Selecione...</option>
                          {empresasDisponiveis.map(emp => (
                            <option key={emp.id} value={emp.id} disabled={formData.empresa1 === emp.id || formData.empresa2 === emp.id}>{emp.label}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  </div>

                  {/* SETORES DA PREFEITURA */}
                  {selecionouPrefeitura && (
                    <div className="bg-slate-50 border border-slate-200 p-5 rounded-2xl space-y-4 animate-in fade-in zoom-in-95 duration-300">
                      <div className="flex items-center">
                        <div className="text-blue-600 mr-2"><IconMapPin /></div>
                        <h3 className="text-lg font-semibold text-slate-800">Setores da Prefeitura</h3>
                      </div>
                      <p className="text-sm text-slate-600">Como você selecionou a Prefeitura, defina as suas áreas de interesse:</p>
                      
                      <div className="grid gap-4 sm:grid-cols-2">
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-slate-700">1ª Opção de Área *</label>
                          <select name="prefeituraArea1" required value={formData.prefeituraArea1} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">Selecione a área principal...</option>
                            {areasPrefeitura.map(area => (
                              <option key={area.id} value={area.id} disabled={formData.prefeituraArea2 === area.id}>{area.label}</option>
                            ))}
                          </select>
                        </div>
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-slate-700">2ª Opção de Área</label>
                          <select name="prefeituraArea2" value={formData.prefeituraArea2} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white" disabled={!formData.prefeituraArea1}>
                            <option value="">Selecione a área secundária...</option>
                            {areasPrefeitura.map(area => (
                              <option key={area.id} value={area.id} disabled={formData.prefeituraArea1 === area.id}>{area.label}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* SETORES DA TRELO */}
                  {selecionouTrelo && (
                    <div className="bg-slate-50 border border-slate-200 p-5 rounded-2xl space-y-4 animate-in fade-in zoom-in-95 duration-300">
                      <div className="flex items-center">
                        <div className="text-blue-600 mr-2"><IconMapPin /></div>
                        <h3 className="text-lg font-semibold text-slate-800">Setores da Trelo</h3>
                      </div>
                      <p className="text-sm text-slate-600">Como você selecionou a Trelo, defina os seus setores de preferência:</p>
                      
                      <div className="grid gap-4 sm:grid-cols-2">
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-slate-700">1ª Opção de Setor *</label>
                          <select name="treloArea1" required value={formData.treloArea1} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">Selecione o setor principal...</option>
                            {areasTrelo.map(area => (
                              <option key={area.id} value={area.id} disabled={formData.treloArea2 === area.id}>{area.label}</option>
                            ))}
                          </select>
                        </div>
                        <div className="space-y-1">
                          <label className="block text-sm font-medium text-slate-700">2ª Opção de Setor</label>
                          <select name="treloArea2" value={formData.treloArea2} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white" disabled={!formData.treloArea1}>
                            <option value="">Selecione o setor secundário...</option>
                            {areasTrelo.map(area => (
                              <option key={area.id} value={area.id} disabled={formData.treloArea1 === area.id}>{area.label}</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* BOTÃO DE ENVIO */}
              <div className="pt-6 border-t border-slate-200">
                <button type="submit" disabled={isSaving} className="w-full sm:w-auto sm:ml-auto flex items-center justify-center px-8 py-4 border border-transparent text-base font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30 disabled:opacity-70">
                  {isSaving ? <><div className="mr-2"><IconLoader /></div> Enviando...</> : <><div className="mr-2"><IconSend /></div> Enviar Formulário</>}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
