<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programa de Estágio</title>
  
  <!-- Tailwind CSS para o Design -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React para a Lógica -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilar o código no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Ícones SVG embutidos
    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconBuilding = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const IconCheck = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconChevron = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconSend = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
    const IconAlert = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconLoader = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [formData, setFormData] = useState({
        nome: '',
        email: '',
        telefone: '',
        codigoCiee: '',
        interesseEstagio: '',
        empresas: [],
        areasPrefeitura: []
      });

      const empresasOptions = [
        { id: 'prefeitura', label: 'Prefeitura' },
        { id: 'trelo', label: 'Trelo' },
        { id: 'tonho', label: 'Tonho Móveis' },
        { id: 'sicoob', label: 'Sicoob' }
      ];

      const areasPrefeituraOptions = [
        { id: 'juridico', label: 'Jurídico' },
        { id: 'saude', label: 'Saúde' },
        { id: 'esporte', label: 'Esporte' },
        { id: 'educacao', label: 'Educação' },
        { id: 'social', label: 'Social' }
      ];

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleEmpresaChange = (empresaId) => {
        setFormData(prev => {
          const isSelected = prev.empresas.includes(empresaId);
          let novasEmpresas = isSelected ? prev.empresas.filter(e => e !== empresaId) : [...prev.empresas, empresaId];
          let novasAreas = prev.areasPrefeitura;
          if (empresaId === 'prefeitura' && isSelected) novasAreas = [];
          return { ...prev, empresas: novasEmpresas, areasPrefeitura: novasAreas };
        });
      };

      const handleAreaChange = (areaId) => {
        setFormData(prev => {
          const isSelected = prev.areasPrefeitura.includes(areaId);
          return {
            ...prev,
            areasPrefeitura: isSelected ? prev.areasPrefeitura.filter(a => a !== areaId) : [...prev.areasPrefeitura, areaId]
          };
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSaving(true);
        
        try {
          // Atraso simulado de 1.5 segundos para mostrar o ícone a carregar
          await new Promise(resolve => setTimeout(resolve, 1500)); 
          console.log('Dados submetidos:', formData);
          setIsSubmitted(true);
        } catch (err) {
          console.error("Erro", err);
        } finally {
          setIsSaving(false);
        }
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6">
              <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-green-600">
                <IconCheck />
              </div>
              <h2 className="text-2xl font-bold text-slate-800">Formulário Enviado!</h2>
              <p className="text-slate-600">Muito obrigado, {formData.nome.split(' ')[0]}! Os seus dados foram registados com sucesso.</p>
              <button onClick={() => { setIsSubmitted(false); setFormData({ nome: '', email: '', telefone: '', codigoCiee: '', interesseEstagio: '', empresas: [], areasPrefeitura: [] }); }} className="mt-6 w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                Enviar nova resposta
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-2xl mx-auto">
            <div className="mb-8 text-center">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4 shadow-sm">
                <IconBriefcase />
              </div>
              <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Programa de Estágio</h1>
              <p className="mt-2 text-lg text-slate-600">Preencha os seus dados para mapearmos as melhores oportunidades.</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-8 bg-white shadow-xl rounded-3xl p-6 sm:p-10 border border-slate-100">
              
              <div className="space-y-6">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-blue-600 mr-3"><IconUser /></div>
                  <h2 className="text-xl font-semibold text-slate-800">1. Dados Pessoais</h2>
                </div>
                
                <div className="grid grid-cols-1 gap-6 sm:grid-cols-2">
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Nome Completo *</label>
                    <input type="text" name="nome" required value={formData.nome} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Ex: João da Silva"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">E-mail *</label>
                    <input type="email" name="email" required value={formData.email} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="joao@email.com"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Telefone / WhatsApp *</label>
                    <input type="tel" name="telefone" required value={formData.telefone} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="(00) 00000-0000"/>
                  </div>
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Código CIEE *</label>
                    <div className="relative">
                      <input type="text" name="codigoCiee" required value={formData.codigoCiee} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Digite o seu número do CIEE"/>
                      <div className="absolute right-3 top-3.5 text-slate-400"><IconAlert /></div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="space-y-6 pt-4">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-blue-600 mr-3"><IconBriefcase /></div>
                  <h2 className="text-xl font-semibold text-slate-800">2. Interesse em Estágio</h2>
                </div>
                <div>
                  <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'sim' ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-300'}`}>
                      <input type="radio" name="interesseEstagio" value="sim" required checked={formData.interesseEstagio === 'sim'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Sim, tenho interesse</span>
                    </label>
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'nao' ? 'bg-slate-100 border-slate-500 text-slate-800' : 'bg-white border-slate-300'}`}>
                      <input type="radio" name="interesseEstagio" value="nao" required checked={formData.interesseEstagio === 'nao'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Não no momento</span>
                    </label>
                  </div>
                </div>
              </div>

              {formData.interesseEstagio === 'sim' && (
                <div className="space-y-6 pt-4">
                  <div className="flex items-center border-b border-slate-200 pb-3">
                    <div className="text-blue-600 mr-3"><IconBuilding /></div>
                    <h2 className="text-xl font-semibold text-slate-800">3. Opções de Empresas</h2>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {empresasOptions.map((empresa) => (
                      <label key={empresa.id} className={`flex items-center p-4 border rounded-xl cursor-pointer transition-colors ${formData.empresas.includes(empresa.id) ? 'bg-blue-50 border-blue-500' : 'bg-white border-slate-300'}`}>
                        <input type="checkbox" checked={formData.empresas.includes(empresa.id)} onChange={() => handleEmpresaChange(empresa.id)} className="w-5 h-5 text-blue-600 rounded"/>
                        <span className="ml-3 font-medium text-slate-800">{empresa.label}</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}

              {formData.interesseEstagio === 'sim' && formData.empresas.includes('prefeitura') && (
                <div className="space-y-6 pt-4">
                  <div className="flex items-center border-b border-blue-100 pb-3 bg-blue-50 p-4 rounded-t-xl">
                    <div className="text-blue-600 mr-2"><IconChevron /></div>
                    <h2 className="text-lg font-semibold text-blue-900">Áreas na Prefeitura</h2>
                  </div>
                  <div className="px-4 pb-4">
                    <div className="flex flex-wrap gap-3">
                      {areasPrefeituraOptions.map((area) => (
                        <label key={area.id} className={`flex items-center px-4 py-3 border rounded-lg cursor-pointer transition-all ${formData.areasPrefeitura.includes(area.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-700 border-slate-300'}`}>
                          <input type="checkbox" checked={formData.areasPrefeitura.includes(area.id)} onChange={() => handleAreaChange(area.id)} className="sr-only"/>
                          <span className="font-medium">{area.label}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              <div className="pt-6 border-t border-slate-200">
                <button type="submit" disabled={isSaving} className="w-full sm:w-auto sm:ml-auto flex items-center justify-center px-8 py-4 border border-transparent text-base font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-colors disabled:opacity-70">
                  {isSaving ? <><div className="mr-2"><IconLoader /></div> Enviando...</> : <><div className="mr-2"><IconSend /></div> Enviar Formulário</>}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
