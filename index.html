<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário Alunos Técnico</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
    }
    .school-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #f97316 100%);
    }
    .animate-pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="antialiased font-sans school-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Ícones
    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconAdmin = () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
    const IconAgro = () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [formData, setFormData] = useState({
        nome: '', cpf: '', ra: '', ano: '', curso: '', interesse: '', empresasRank: []
      });

      const handleRanking = (id) => {
        let current = [...formData.empresasRank];
        if (current.includes(id)) {
          current = current.filter(i => i !== id);
        } else if (current.length < 3) {
          current.push(id);
        }
        setFormData({...formData, empresasRank: current});
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center animate-pop">
              <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
              </div>
              <h2 className="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Enviado!</h2>
              <p className="text-slate-600 mb-8 text-lg font-medium tracking-tight">Obrigado, {formData.nome.split(' ')[0]}! O seu questionário foi registado.</p>
              <button onClick={() => window.location.reload()} className="w-full py-5 bg-orange-600 hover:bg-orange-700 text-white font-black rounded-2xl shadow-xl transition-all active:scale-95">NOVA RESPOSTA</button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-12 px-4">
          <div className="max-w-3xl mx-auto">
            
            {/* CABEÇALHO */}
            <div className="text-center mb-10">
              <div className="inline-block p-2 bg-white rounded-full shadow-2xl mb-6 border-4 border-white/30 overflow-hidden">
                <img 
                  src="./logo.png" 
                  alt="Logo Escola" 
                  className="w-32 h-32 object-contain rounded-full"
                  onError={(e) => { 
                    if (!e.target.src.includes('logo.jpg')) { e.target.src = './logo.jpg'; }
                    else { e.target.src = 'https://via.placeholder.com/150?text=LOGO'; }
                  }}
                />
              </div>
              <h1 className="text-3xl sm:text-4xl font-black text-white uppercase tracking-tighter drop-shadow-xl mb-2">Questionário Alunos Técnico</h1>
              <p className="text-blue-50 font-bold opacity-90 mt-2 tracking-wide italic">Coronel Castanho de Almeida • 2026</p>
            </div>

            <form onSubmit={(e) => { e.preventDefault(); setIsSubmitted(true); }} className="glass-effect space-y-10 rounded-[2.5rem] p-6 sm:p-12 shadow-2xl border border-white/20">
              
              {/* DADOS PESSOAIS */}
              <div className="space-y-6">
                <h2 className="text-xl font-black text-slate-800 uppercase flex items-center border-b pb-3">
                  <span className="text-orange-500 mr-2 bg-orange-50 p-2 rounded-lg"><IconUser /></span> 1. Identificação
                </h2>
                <div className="grid grid-cols-1 gap-6">
                  <input type="text" placeholder="Nome Completo" required className="w-full p-4 rounded-2xl border-2 focus:border-blue-500 outline-none bg-slate-50/50 font-medium" onChange={e => setFormData({...formData, nome: e.target.value})} />
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" placeholder="CPF" required className="p-4 rounded-2xl border-2 outline-none bg-slate-50/50" />
                    <input type="text" placeholder="RA" required className="p-4 rounded-2xl border-2 outline-none bg-slate-50/50" />
                  </div>
                </div>
              </div>

              {/* ANO E CURSO */}
              <div className="space-y-6">
                <h3 className="font-black text-slate-400 text-xs uppercase tracking-widest text-center">Ano e Curso Técnico</h3>
                <div className="grid grid-cols-2 gap-4 text-center">
                  {['2º Ano', '3º Ano'].map(a => (
                    <label key={a} className={`p-4 border-2 rounded-2xl cursor-pointer font-black transition-all ${formData.ano === a ? 'bg-blue-600 border-blue-600 text-white shadow-lg scale-105' : 'bg-white text-slate-300'}`}>
                      <input type="radio" name="ano" className="sr-only" required onChange={() => setFormData({...formData, ano: a})} /> {a}
                    </label>
                  ))}
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <label className={`flex flex-col items-center p-8 border-2 rounded-3xl cursor-pointer transition-all ${formData.curso === 'ADM' ? 'bg-blue-600 border-blue-600 text-white shadow-xl scale-[1.02]' : 'bg-white text-slate-400 hover:border-blue-300'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'ADM', empresasRank: []})} />
                    <div className={`mb-4 p-4 rounded-2xl ${formData.curso === 'ADM' ? 'bg-white/20' : 'bg-blue-50 text-blue-500'}`}><IconAdmin /></div>
                    <span className="text-xl font-black uppercase">Administração</span>
                  </label>
                  <label className={`flex flex-col items-center p-8 border-2 rounded-3xl cursor-pointer transition-all ${formData.curso === 'AGRO' ? 'bg-orange-600 border-orange-600 text-white shadow-xl scale-[1.02]' : 'bg-white text-slate-400 hover:border-orange-300'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'AGRO', empresasRank: ['prefeitura']})} />
                    <div className={`mb-4 p-4 rounded-2xl ${formData.curso === 'AGRO' ? 'bg-white/20' : 'bg-orange-50 text-orange-500'}`}><IconAgro /></div>
                    <span className="text-xl font-black uppercase">Agronegócio</span>
                  </label>
                </div>
              </div>

              {/* ESTÁGIO */}
              {formData.curso && (
                <div className="space-y-6 animate-pop">
                  <h2 className="text-xl font-black text-slate-800 uppercase flex items-center border-b pb-3">
                    <span className="text-orange-500 mr-2 bg-orange-50 p-2 rounded-lg"><IconBriefcase /></span> 2. Opção de Estágio
                  </h2>
                  {formData.curso === 'AGRO' ? (
                    <div className="p-8 bg-green-50 border-2 border-green-200 rounded-[2rem] text-green-800 font-bold text-center">
                      Para o curso de Agronegócio, a única empresa de estágio disponível é a Prefeitura.
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                      {['Prefeitura', 'Trelo', 'Tonho Móveis', 'Sicoob'].map(emp => {
                        const rank = formData.empresasRank.indexOf(emp);
                        return (
                          <div key={emp} onClick={() => handleRanking(emp)} className={`relative p-5 border-2 rounded-2xl cursor-pointer text-center font-bold transition-all ${rank !== -1 ? 'border-orange-500 bg-orange-50 text-orange-900 shadow-md transform scale-[1.05]' : 'bg-white text-slate-400'}`}>
                            {rank !== -1 && <span className="absolute -top-3 -right-3 bg-orange-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg animate-bounce">{rank + 1}º</span>}
                            {emp}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              <button type="submit" className="w-full py-6 bg-orange-600 hover:bg-orange-700 text-white text-2xl font-black rounded-[2rem] transition-all shadow-xl shadow-orange-600/30 active:scale-95 uppercase tracking-widest">
                Enviar Questionário
              </button>

            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
