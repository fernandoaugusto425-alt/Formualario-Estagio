<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário Alunos Técnico</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12px);
    }
    .school-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #f97316 100%);
    }
    .animate-pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    /* Classe para forçar o laranja e negrito solicitado */
    .text-orange-bold {
      color: #ea580c !important; /* Orange 600 */
      font-weight: 900 !important;
    }
  </style>
</head>
<body class="antialiased font-sans school-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconBuilding = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/></svg>;
    const IconCheck = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="text-green-600"><path d="M20 6L9 17l-5-5"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [formData, setFormData] = useState({
        nome: '', email: '', telefone: '', cpf: '', ra: '', 
        ano: '', curso: '', interesse: '', codigoCiee: '',
        empresasRank: [], prefeituraRank: [], treloRank: []
      });

      const todasEmpresas = [
        { id: 'prefeitura', label: 'Prefeitura' },
        { id: 'trelo', label: 'Trelo' },
        { id: 'tonho', label: 'Tonho Móveis' },
        { id: 'sicoob', label: 'Sicoob' }
      ];

      const areasPrefeitura = [
        { id: 'juridico', label: 'Jurídico' }, { id: 'saude', label: 'Saúde' },
        { id: 'esporte', label: 'Esporte' }, { id: 'educacao', label: 'Educação' },
        { id: 'social', label: 'Social' }
      ];

      const areasTrelo = [
        { id: 'marketing', label: 'Marketing' }, 
        { id: 'administrativo', label: 'Administrativo' },
        { id: 'logistica', label: 'Logística' }, 
        { id: 'v_merch', label: 'Visual Merch.' }
      ];

      const handleRanking = (listName, id, max) => {
        let current = [...formData[listName]];
        if (current.includes(id)) {
          current = current.filter(i => i !== id);
        } else if (current.length < max) {
          current.push(id);
        }
        setFormData({...formData, [listName]: current});
      };

      const handleImageError = (e) => {
        const currentSrc = e.target.src;
        if (currentSrc.includes('logo.png')) e.target.src = './logo.jpg';
        else e.target.src = 'https://via.placeholder.com/150?text=LOGO';
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center animate-pop border-t-8 border-orange-500">
              <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <IconCheck />
              </div>
              <h2 className="text-3xl font-black text-orange-600 mb-2 uppercase tracking-tighter">Enviado!</h2>
              <p className="text-orange-700 mb-8 font-black">Questionário registado com sucesso.</p>
              <button onClick={() => window.location.reload()} className="w-full py-4 bg-orange-600 hover:bg-orange-700 text-white font-black rounded-2xl shadow-lg transition-all active:scale-95 uppercase">Voltar ao Início</button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-4 px-4">
          <div className="max-w-3xl mx-auto">
            
            {/* CABEÇALHO */}
            <div className="text-center mb-4">
              <div className="mb-2">
                <img 
                  src="./logo.png" 
                  alt="Logo Escola" 
                  className="mx-auto w-32 h-32 sm:w-40 sm:h-40 object-contain drop-shadow-2xl transition-transform hover:scale-105 duration-300"
                  onError={handleImageError}
                />
              </div>
              <h1 className="text-3xl sm:text-5xl font-black text-white uppercase tracking-tighter drop-shadow-xl text-center">Questionário Alunos Técnico</h1>
              <p className="text-orange-100 font-black opacity-100 mt-1 tracking-wide italic text-base sm:text-lg drop-shadow-md text-center uppercase">Coronel Castanho de Almeida • 2026</p>
            </div>

            <form onSubmit={(e) => { e.preventDefault(); setIsSubmitted(true); }} className="glass-effect space-y-8 rounded-[2.5rem] p-6 sm:p-12 shadow-2xl border border-white/20">
              
              {/* 1. IDENTIFICAÇÃO */}
              <div className="space-y-6">
                <h2 className="text-2xl font-black text-orange-600 uppercase flex items-center border-b-4 pb-3 border-orange-100">
                  <span className="text-white mr-3 bg-orange-500 p-2 rounded-xl shadow-sm"><IconUser /></span> 1. Identificação
                </h2>
                <div className="grid grid-cols-1 gap-4 font-black">
                  <div>
                    <label className="text-xs uppercase tracking-widest text-orange-600 ml-2 mb-1 block">Nome Completo</label>
                    <input type="text" placeholder="Insira o seu nome" required className="w-full p-4 rounded-2xl border-2 border-orange-200 focus:border-orange-500 outline-none bg-orange-50/30 text-orange-700 placeholder:text-orange-300" onChange={e => setFormData({...formData, nome: e.target.value})} />
                  </div>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs uppercase tracking-widest text-orange-600 ml-2 mb-1 block">E-mail</label>
                      <input type="email" placeholder="seu@email.com" required className="p-4 rounded-2xl border-2 border-orange-200 outline-none bg-orange-50/30 text-orange-700 placeholder:text-orange-300" onChange={e => setFormData({...formData, email: e.target.value})} />
                    </div>
                    <div>
                      <label className="text-xs uppercase tracking-widest text-orange-600 ml-2 mb-1 block">Telefone</label>
                      <input type="tel" placeholder="(00) 00000-0000" required className="p-4 rounded-2xl border-2 border-orange-200 outline-none bg-orange-50/30 text-orange-700 placeholder:text-orange-300" onChange={e => setFormData({...formData, telefone: e.target.value})} />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs uppercase tracking-widest text-orange-600 ml-2 mb-1 block">CPF</label>
                      <input type="text" placeholder="000.000.000-00" required className="p-4 rounded-2xl border-2 border-orange-200 outline-none bg-orange-50/30 text-orange-700 placeholder:text-orange-300" onChange={e => setFormData({...formData, cpf: e.target.value})} />
                    </div>
                    <div>
                      <label className="text-xs uppercase tracking-widest text-orange-600 ml-2 mb-1 block">RA</label>
                      <input type="text" placeholder="Registo Académico" required className="p-4 rounded-2xl border-2 border-orange-200 outline-none bg-orange-50/30 text-orange-700 placeholder:text-orange-300" onChange={e => setFormData({...formData, ra: e.target.value})} />
                    </div>
                  </div>
                </div>
              </div>

              {/* 2. ANO E CURSO */}
              <div className="space-y-6">
                <h3 className="font-black text-orange-600 text-sm uppercase tracking-widest text-center underline decoration-orange-500 decoration-2 underline-offset-4">Ano e Curso Técnico</h3>
                <div className="grid grid-cols-2 gap-3 text-center">
                  {['2º Ano', '3º Ano'].map(a => (
                    <label key={a} className={`p-4 border-2 border-orange-200 rounded-2xl cursor-pointer font-black transition-all text-lg ${formData.ano === a ? 'bg-orange-600 border-orange-600 text-white shadow-lg scale-105' : 'bg-white text-orange-600 hover:bg-orange-50'}`}>
                      <input type="radio" name="ano" className="sr-only" required onChange={() => setFormData({...formData, ano: a})} /> {a}
                    </label>
                  ))}
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {/* ADMINISTRAÇÃO */}
                  <label className={`flex flex-col items-center p-6 border-2 border-orange-200 rounded-[2rem] cursor-pointer transition-all ${formData.curso === 'ADM' ? 'bg-orange-600 border-orange-600 text-white shadow-xl' : 'bg-white text-orange-600 hover:border-orange-400'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'ADM', empresasRank: [], prefeituraRank: [], treloRank: []})} />
                    <div className="mb-4 w-20 h-20 flex items-center justify-center p-1">
                        <img src="./logo_adm.png" alt="ADM" className="w-full h-full object-contain" onError={(e) => e.target.src='https://via.placeholder.com/80?text=ADM'} />
                    </div>
                    <span className="text-xl font-black uppercase tracking-tighter">Administração</span>
                  </label>

                  {/* AGRONEGÓCIO */}
                  <label className={`flex flex-col items-center p-6 border-2 border-orange-200 rounded-[2rem] cursor-pointer transition-all ${formData.curso === 'AGRO' ? 'bg-orange-600 border-orange-600 text-white shadow-xl' : 'bg-white text-orange-600 hover:border-orange-400'}`}>
                    <input type="radio" name="curso" className="sr-only" required onChange={() => setFormData({...formData, curso: 'AGRO', empresasRank: ['prefeitura'], prefeituraRank: [], treloRank: []})} />
                    <div className="mb-4 w-20 h-20 flex items-center justify-center p-1">
                        <img src="./logo_agro.png" alt="AGRO" className="w-full h-full object-contain" onError={(e) => e.target.src='https://via.placeholder.com/80?text=AGRO'} />
                    </div>
                    <span className="text-xl font-black uppercase tracking-tighter">Agronegócio</span>
                  </label>
                </div>
              </div>

              {/* 3. ESTÁGIO */}
              <div className="space-y-6">
                <h2 className="text-2xl font-black text-orange-600 uppercase flex items-center border-b-4 pb-3 border-orange-100">
                  <span className="text-white mr-3 bg-orange-500 p-2 rounded-xl shadow-sm"><IconBriefcase /></span> 2. Estágio
                </h2>
                <div className="flex gap-3">
                  {['SIM', 'NÃO'].map(opt => (
                    <label key={opt} className={`flex-1 p-4 border-2 border-orange-200 rounded-2xl cursor-pointer text-center font-black text-lg transition-all ${formData.interesse === opt ? 'bg-orange-600 border-orange-600 text-white shadow-lg' : 'bg-white text-orange-600 hover:bg-orange-50'}`}>
                      <input type="radio" name="interesse" className="sr-only" required onChange={() => setFormData({...formData, interesse: opt})} /> {opt === 'SIM' ? 'QUERO' : 'NÃO'}
                    </label>
                  ))}
                </div>
              </div>

              {/* CONTEÚDO DINÂMICO */}
              {formData.interesse === 'SIM' && (
                <div className="space-y-10 animate-pop pt-2">
                  
                  <div className="bg-orange-50 p-6 rounded-[2rem] border-2 border-orange-200 shadow-inner text-center">
                    <label className="block text-xs font-black text-orange-700 mb-3 uppercase tracking-widest">Código de Cadastro CIEE *</label>
                    <input type="text" placeholder="Digite o seu código CIEE" required className="w-full p-4 rounded-xl border-2 border-white outline-none focus:border-orange-600 font-black text-center text-orange-800" onChange={e => setFormData({...formData, codigoCiee: e.target.value})} />
                  </div>

                  <div className="space-y-6">
                    <h3 className="font-black text-orange-600 uppercase flex items-center tracking-tight text-xl">
                       <span className="text-white mr-2 bg-orange-500 p-2 rounded-lg shadow-sm"><IconBuilding /></span> 3. Prioridade de Empresa
                    </h3>
                    
                    {formData.curso === 'AGRO' ? (
                      <div className="p-8 bg-orange-50 border-2 border-orange-200 rounded-[2rem] text-orange-950 font-black text-center shadow-md">
                        <p className="text-sm text-orange-600 mb-2 uppercase tracking-widest">Opção única para Agronegócio:</p>
                        <div className="p-5 bg-white border-2 border-orange-500 rounded-2xl text-2xl text-orange-600">1º PREFEITURA</div>
                      </div>
                    ) : (
                      <>
                        <p className="text-xs font-black text-orange-400 mb-2 uppercase tracking-wide">Classifique por ordem de preferência (1º ao 4º):</p>
                        <div className="grid grid-cols-2 gap-4">
                          {todasEmpresas.map(emp => {
                            const rank = formData.empresasRank.indexOf(emp.id);
                            return (
                              <div key={emp.id} onClick={() => handleRanking('empresasRank', emp.id, 4)} className={`relative p-5 border-2 border-orange-200 rounded-2xl cursor-pointer text-center font-black text-lg transition-all ${rank !== -1 ? 'border-orange-600 bg-orange-600 text-white shadow-xl scale-105' : 'bg-white text-orange-600 hover:border-orange-300'}`}>
                                {rank !== -1 && <span className="absolute -top-3 -right-3 bg-white text-orange-600 w-10 h-10 rounded-full flex items-center justify-center text-lg font-black shadow-xl border-2 border-orange-600 animate-bounce">{rank + 1}º</span>}
                                {emp.label}
                              </div>
                            );
                          })}
                        </div>
                      </>
                    )}
                  </div>

                  {/* SETORES (ADM APENAS) */}
                  {formData.curso === 'ADM' && formData.empresasRank.includes('prefeitura') && (
                    <div className="p-8 bg-orange-50/50 rounded-[2rem] border-2 border-orange-200 space-y-6 shadow-inner animate-pop">
                      <p className="font-black text-orange-600 uppercase text-xs tracking-widest text-center">Classifique os Setores da Prefeitura</p>
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        {areasPrefeitura.map(a => {
                          const rank = formData.prefeituraRank.indexOf(a.id);
                          return (
                            <div key={a.id} onClick={() => handleRanking('prefeituraRank', a.id, areasPrefeitura.length)} className={`relative p-3 border-2 border-orange-200 rounded-xl cursor-pointer text-center text-xs font-black transition-all ${rank !== -1 ? 'border-orange-600 bg-orange-600 text-white shadow-xl' : 'bg-white text-orange-600 hover:border-orange-400'}`}>
                              {rank !== -1 && <span className="absolute -top-1.5 -right-1.5 bg-white text-orange-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black border-2 border-orange-600">{rank + 1}º</span>}
                              {a.label}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {formData.curso === 'ADM' && formData.empresasRank.includes('trelo') && (
                    <div className="p-8 bg-orange-50/50 rounded-[2rem] border-2 border-orange-200 space-y-6 shadow-inner animate-pop">
                      <p className="font-black text-orange-600 uppercase text-xs tracking-widest text-center">Classifique os Setores da Trelo</p>
                      <div className="grid grid-cols-2 sm:grid-cols-2 gap-3">
                        {areasTrelo.map(a => {
                          const rank = formData.treloRank.indexOf(a.id);
                          return (
                            <div key={a.id} onClick={() => handleRanking('treloRank', a.id, areasTrelo.length)} className={`relative p-3 border-2 border-orange-200 rounded-xl cursor-pointer text-center text-xs font-black transition-all ${rank !== -1 ? 'border-orange-600 bg-orange-600 text-white shadow-xl' : 'bg-white text-orange-600 hover:border-orange-400'}`}>
                              {rank !== -1 && <span className="absolute -top-1.5 -right-1.5 bg-white text-orange-600 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black border-2 border-orange-600">{rank + 1}º</span>}
                              {a.label}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              <div className="pt-4">
                <button type="submit" className="w-full py-6 bg-orange-600 hover:bg-orange-700 text-white text-2xl font-black rounded-[2rem] transition-all shadow-xl shadow-orange-600/50 active:scale-95 uppercase tracking-widest">
                  Enviar Questionário
                </button>
              </div>
            </form>
            
            <p className="text-center text-white font-black text-sm mt-8 tracking-widest uppercase drop-shadow-md">&copy; 2026 Escola Coronel Castanho de Almeida</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
