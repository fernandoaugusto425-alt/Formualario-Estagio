<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário Alunos Técnico</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Ícones SVG
    const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconBriefcase = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const IconBuilding = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const IconCheck = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const IconChevron = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconSend = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
    const IconAlert = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const IconLoader = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const IconMapPin = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const IconGraduationCap = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    // Ícones dos Cursos
    const IconAdmin = () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
    const IconAgro = () => <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>;

    function App() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [formData, setFormData] = useState({
        nome: '', email: '', telefone: '', cpf: '', ra: '',
        ano: '', curso: '', // Novos campos
        interesseEstagio: '', codigoCiee: '',
        empresasRank: [],
        prefeituraRank: [],
        treloRank: []
      });

      // Opções disponíveis
      const todasEmpresas = [
        { id: 'prefeitura', label: 'Prefeitura' },
        { id: 'trelo', label: 'Trelo' },
        { id: 'tonho', label: 'Tonho Móveis' },
        { id: 'sicoob', label: 'Sicoob' }
      ];

      // Se for Agronegócio, filtra para mostrar apenas Prefeitura
      const empresasDisponiveis = formData.curso === 'agronegocio' 
        ? [{ id: 'prefeitura', label: 'Prefeitura' }] 
        : todasEmpresas;

      const areasPrefeitura = [
        { id: 'juridico', label: 'Jurídico' },
        { id: 'saude', label: 'Saúde' },
        { id: 'esporte', label: 'Esporte' },
        { id: 'educacao', label: 'Educação' },
        { id: 'social', label: 'Social' }
      ];

      const areasTrelo = [
        { id: 'marketing', label: 'Marketing' },
        { id: 'visual_merchandising', label: 'Visual Merch.' },
        { id: 'administrativo', label: 'Administrativo' },
        { id: 'logistico', label: 'Logístico' }
      ];

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => {
          const newData = { ...prev, [name]: value };
          
          // Lógica de limpeza se desistir do estágio
          if (name === 'interesseEstagio' && value === 'nao') {
            newData.codigoCiee = '';
            newData.empresasRank = [];
            newData.prefeituraRank = [];
            newData.treloRank = [];
          }

          // Lógica de limpeza se mudar para Agronegócio
          if (name === 'curso' && value === 'agronegocio') {
            // Remove qualquer empresa que não seja a Prefeitura
            newData.empresasRank = newData.empresasRank.filter(e => e === 'prefeitura');
            // Remove áreas da prefeitura (pois agro não tem setores)
            newData.prefeituraRank = [];
            newData.treloRank = [];
          }
          
          return newData;
        });
      };

      const handleRanking = (listName, itemId, maxItems) => {
        setFormData(prev => {
          let currentList = [...prev[listName]];
          
          if (currentList.includes(itemId)) {
            currentList = currentList.filter(id => id !== itemId);
          } else if (currentList.length < maxItems) {
            currentList.push(itemId);
          }

          const newState = { ...prev, [listName]: currentList };

          if (listName === 'empresasRank' && !currentList.includes('prefeitura')) {
            newState.prefeituraRank = [];
          }
          if (listName === 'empresasRank' && !currentList.includes('trelo')) {
            newState.treloRank = [];
          }

          return newState;
        });
      };

      const selecionouPrefeitura = formData.empresasRank.includes('prefeitura');
      const selecionouTrelo = formData.empresasRank.includes('trelo');

      // Condição especial: Mostrar setores da prefeitura apenas se NÃO for Agronegócio
      const mostrarSetoresPrefeitura = selecionouPrefeitura && formData.curso !== 'agronegocio';

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (formData.interesseEstagio === 'sim' && formData.empresasRank.length === 0) {
          alert("Por favor, selecione pelo menos uma empresa de interesse.");
          return;
        }

        setIsSaving(true);
        try {
          // =========================================================
          const FORMSPREE_URL = 'COLE_AQUI_O_SEU_LINK_DO_FORMSPREE'; 
          // =========================================================
          
          if(FORMSPREE_URL === 'COLE_AQUI_O_SEU_LINK_DO_FORMSPREE') {
            await new Promise(resolve => setTimeout(resolve, 1500)); 
            setIsSubmitted(true);
            setIsSaving(false);
            return;
          }

          const response = await fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
              Nome: formData.nome,
              Email: formData.email,
              Telefone: formData.telefone,
              CPF: formData.cpf,
              RA: formData.ra,
              Ano: formData.ano,
              Curso: formData.curso,
              Interesse_Estagio: formData.interesseEstagio,
              Codigo_CIEE: formData.codigoCiee,
              Empresas_Prioridade: formData.empresasRank.map((e, i) => `${i+1}º ${e.toUpperCase()}`).join(', '),
              Prefeitura_Setores: formData.prefeituraRank.map((e, i) => `${i+1}º ${e.toUpperCase()}`).join(', '),
              Trelo_Setores: formData.treloRank.map((e, i) => `${i+1}º ${e.toUpperCase()}`).join(', ')
            })
          });

          if (response.ok) setIsSubmitted(true);
          else alert("Ocorreu um erro ao enviar. Por favor, tente novamente.");
        } catch (err) {
          alert("Erro de ligação. Verifique a internet e tente novamente.");
        } finally {
          setIsSaving(false);
        }
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-orange-500 flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center space-y-6">
              <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto text-green-600 shadow-inner">
                <IconCheck />
              </div>
              <h2 className="text-3xl font-bold text-slate-800">Formulário Enviado!</h2>
              <p className="text-slate-600 text-lg">Muito obrigado, {formData.nome.split(' ')[0]}! O seu questionário foi registado com sucesso.</p>
              <button onClick={() => window.location.reload()} className="mt-6 w-full py-4 px-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl transition-colors shadow-lg shadow-orange-500/30 text-lg">
                Enviar nova resposta
              </button>
            </div>
          </div>
        );
      }

      const RankingGrid = ({ listName, options, maxItems }) => (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
          {options.map(item => {
            const rankIndex = formData[listName].indexOf(item.id);
            const isSelected = rankIndex !== -1;
            const isDisabled = !isSelected && formData[listName].length >= maxItems;
            
            return (
              <div
                key={item.id}
                onClick={() => !isDisabled && handleRanking(listName, item.id, maxItems)}
                className={`relative p-4 rounded-xl border-2 transition-all select-none ${isDisabled ? 'opacity-50 cursor-not-allowed border-slate-200 bg-slate-50' : 'cursor-pointer hover:border-blue-300'} ${isSelected ? 'border-orange-500 bg-orange-50 shadow-sm' : 'border-slate-200 bg-white'}`}
              >
                {isSelected && (
                  <div className="absolute -top-3 -right-3 bg-orange-500 text-white text-sm font-bold w-8 h-8 flex items-center justify-center rounded-full shadow-md transform scale-100 animate-in zoom-in duration-200">
                    {rankIndex + 1}º
                  </div>
                )}
                <div className="flex flex-col items-center text-center space-y-2">
                  <span className={`font-semibold text-sm ${isSelected ? 'text-orange-800' : 'text-slate-600'}`}>
                    {item.label}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      );

      return (
        // FUNDO DEGRADÊ AZUL E LARANJA
        <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-orange-500 py-12 px-4 sm:px-6 lg:px-8">
          <div className="max-w-3xl mx-auto">
            
            {/* CABEÇALHO */}
            <div className="mb-10 text-center">
              <div className="inline-flex items-center justify-center mb-6 bg-white p-2 rounded-full shadow-2xl">
                <img 
                  src="./logo.jpg" 
                  alt="Logo Coronel Castanho de Almeida" 
                  className="w-32 h-32 object-contain rounded-full border-4 border-slate-100"
                  onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/128?text=Logo'; }}
                />
              </div>
              <h1 className="text-4xl font-extrabold text-white tracking-tight drop-shadow-md">Questionário Alunos Técnico</h1>
              <p className="mt-3 text-lg text-blue-100 font-medium drop-shadow">Preencha os seus dados para mapearmos as melhores oportunidades.</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-8 bg-white shadow-2xl rounded-3xl p-6 sm:p-10 border border-slate-100">
              
              {/* DADOS PESSOAIS E ESCOLARES */}
              <div className="space-y-6">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-orange-500 mr-3"><IconUser /></div>
                  <h2 className="text-xl font-semibold text-slate-800">1. Dados do Aluno</h2>
                </div>
                
                <div className="grid grid-cols-1 gap-6 sm:grid-cols-2">
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Nome Completo *</label>
                    <input type="text" name="nome" required value={formData.nome} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Ex: João da Silva"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">E-mail *</label>
                    <input type="email" name="email" required value={formData.email} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="joao@email.com"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Telefone / WhatsApp *</label>
                    <input type="tel" name="telefone" required value={formData.telefone} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="(00) 00000-0000"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">CPF *</label>
                    <input type="text" name="cpf" required value={formData.cpf} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="000.000.000-00"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">RA (Registo Académico) *</label>
                    <input type="text" name="ra" required value={formData.ra} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="O seu número de RA"/>
                  </div>
                  
                  {/* NOVO: ANO ESCOLAR */}
                  <div className="sm:col-span-2 pt-2">
                    <label className="block text-sm font-medium text-slate-700 mb-3 flex items-center"><IconGraduationCap /><span className="ml-2">Ano letivo atual *</span></label>
                    <div className="flex space-x-4">
                      <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.ano === '2' ? 'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                        <input type="radio" name="ano" value="2" required checked={formData.ano === '2'} onChange={handleInputChange} className="sr-only"/>
                        <span className="font-semibold">2º Ano</span>
                      </label>
                      <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.ano === '3' ? 'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                        <input type="radio" name="ano" value="3" required checked={formData.ano === '3'} onChange={handleInputChange} className="sr-only"/>
                        <span className="font-semibold">3º Ano</span>
                      </label>
                    </div>
                  </div>

                  {/* NOVO: CURSO TÉCNICO COM ÍCONES */}
                  <div className="sm:col-span-2 pt-2">
                    <label className="block text-sm font-medium text-slate-700 mb-3">Qual é o seu Curso Técnico? *</label>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      
                      {/* ADMINISTRAÇÃO */}
                      <label className={`flex flex-col items-center justify-center p-6 border-2 rounded-2xl cursor-pointer transition-all ${formData.curso === 'administracao' ? 'bg-blue-50 border-blue-500 text-blue-800 shadow-md transform scale-[1.02]' : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300 hover:bg-slate-50'}`}>
                        <input type="radio" name="curso" value="administracao" required checked={formData.curso === 'administracao'} onChange={handleInputChange} className="sr-only"/>
                        <div className={`mb-3 p-3 rounded-full ${formData.curso === 'administracao' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}>
                          <IconAdmin />
                        </div>
                        <span className="font-bold text-lg">Administração</span>
                      </label>

                      {/* AGRONEGÓCIO */}
                      <label className={`flex flex-col items-center justify-center p-6 border-2 rounded-2xl cursor-pointer transition-all ${formData.curso === 'agronegocio' ? 'bg-green-50 border-green-500 text-green-800 shadow-md transform scale-[1.02]' : 'bg-white border-slate-200 text-slate-600 hover:border-green-300 hover:bg-slate-50'}`}>
                        <input type="radio" name="curso" value="agronegocio" required checked={formData.curso === 'agronegocio'} onChange={handleInputChange} className="sr-only"/>
                        <div className={`mb-3 p-3 rounded-full ${formData.curso === 'agronegocio' ? 'bg-green-600 text-white' : 'bg-slate-100 text-slate-500'}`}>
                          <IconAgro />
                        </div>
                        <span className="font-bold text-lg">Agronegócio</span>
                      </label>

                    </div>
                  </div>

                </div>
              </div>

              {/* INTERESSE EM ESTÁGIO */}
              <div className="space-y-6 pt-4">
                <div className="flex items-center border-b border-slate-200 pb-3">
                  <div className="text-orange-500 mr-3"><IconBriefcase /></div>
                  <h2 className="text-xl font-semibold text-slate-800">2. Interesse em Estágio</h2>
                </div>
                <div>
                  <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'sim' ? 'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                      <input type="radio" name="interesseEstagio" value="sim" required checked={formData.interesseEstagio === 'sim'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Sim, tenho interesse</span>
                    </label>
                    <label className={`flex-1 flex items-center justify-center p-4 border rounded-xl cursor-pointer transition-all ${formData.interesseEstagio === 'nao' ? 'bg-slate-100 border-slate-500 text-slate-800 ring-2 ring-slate-500/20' : 'bg-white border-slate-300 hover:bg-slate-50'}`}>
                      <input type="radio" name="interesseEstagio" value="nao" required checked={formData.interesseEstagio === 'nao'} onChange={handleInputChange} className="sr-only"/>
                      <span className="font-semibold">Não no momento</span>
                    </label>
                  </div>
                </div>
              </div>

              {/* DADOS COMPLEMENTARES (Aparece só se "Sim") */}
              {formData.interesseEstagio === 'sim' && (
                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  
                  {/* CÓDIGO CIEE */}
                  <div className="bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                    <label className="block text-sm font-semibold text-orange-900 mb-2">Código CIEE *</label>
                    <p className="text-xs text-orange-700 mb-3">Como tem interesse em estagiar, precisamos do seu código CIEE.</p>
                    <div className="relative">
                      <input type="text" name="codigoCiee" required={formData.interesseEstagio === 'sim'} value={formData.codigoCiee} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none" placeholder="Digite o seu número do CIEE"/>
                      <div className="absolute right-3 top-3.5 text-slate-400"><IconAlert /></div>
                    </div>
                  </div>

                  {/* RANKING DE EMPRESAS */}
                  <div className="space-y-4">
                    <div className="flex items-center border-b border-slate-200 pb-3">
                      <div className="text-orange-500 mr-3"><IconBuilding /></div>
                      <div>
                        <h2 className="text-xl font-semibold text-slate-800">3. Prioridade de Empresas</h2>
                        {formData.curso === 'agronegocio' ? (
                          <p className="text-sm text-green-600 font-medium mt-1">Para o curso de Agronegócio, a empresa disponível é a Prefeitura.</p>
                        ) : (
                          <p className="text-sm text-slate-500 mt-1 flex items-center">
                            Clique nas opções na ordem da sua preferência (até {empresasDisponiveis.length} escolhas).
                          </p>
                        )}
                      </div>
                    </div>
                    
                    <RankingGrid listName="empresasRank" options={empresasDisponiveis} maxItems={empresasDisponiveis.length} />
                    
                    {formData.empresasRank.length === 0 && (
                       <p className="text-sm text-red-500 mt-2">* Selecione pelo menos uma empresa clicando nos cartões acima.</p>
                    )}
                  </div>

                  {/* SETORES DA PREFEITURA (SÓ MOSTRA SE NÃO FOR AGRONEGÓCIO) */}
                  {mostrarSetoresPrefeitura && (
                    <div className="bg-slate-50 border border-slate-200 p-6 rounded-3xl space-y-4 animate-in fade-in zoom-in-95 duration-300">
                      <div className="flex items-center">
                        <div className="text-blue-600 mr-2"><IconMapPin /></div>
                        <div>
                          <h3 className="text-lg font-semibold text-slate-800">Setores da Prefeitura</h3>
                          <p className="text-sm text-slate-500">Selecione até 2 áreas clicando na ordem da sua preferência.</p>
                        </div>
                      </div>
                      
                      <RankingGrid listName="prefeituraRank" options={areasPrefeitura} maxItems={2} />
                    </div>
                  )}

                  {/* SETORES DA TRELO */}
                  {selecionouTrelo && (
                    <div className="bg-slate-50 border border-slate-200 p-6 rounded-3xl space-y-4 animate-in fade-in zoom-in-95 duration-300">
                      <div className="flex items-center">
                        <div className="text-blue-600 mr-2"><IconMapPin /></div>
                        <div>
                          <h3 className="text-lg font-semibold text-slate-800">Setores da Trelo</h3>
                          <p className="text-sm text-slate-500">Selecione até 2 setores clicando na ordem da sua preferência.</p>
                        </div>
                      </div>
                      
                      <RankingGrid listName="treloRank" options={areasTrelo} maxItems={2} />
                    </div>
                  )}
                </div>
              )}

              {/* BOTÃO DE ENVIO */}
              <div className="pt-6 border-t border-slate-200">
                <button type="submit" disabled={isSaving} className="w-full sm:w-auto sm:ml-auto flex items-center justify-center px-8 py-4 border border-transparent text-lg font-bold rounded-xl text-white bg-orange-500 hover:bg-orange-600 transition-colors shadow-lg shadow-orange-500/30 disabled:opacity-70">
                  {isSaving ? <><div className="mr-2"><IconLoader /></div> A Enviar...</> : <><div className="mr-2"><IconSend /></div> Enviar Questionário</>}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
