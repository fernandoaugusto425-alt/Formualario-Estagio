          return;
        }
        setStatus(s => ({...s, loading: true, error: ''}));
        try {
          const { addDoc, collection, serverTimestamp } = window.FirebaseLib;
          await addDoc(collection(db, 'visitas_tecnicas'), {

          setStatus(s => ({...s, loading: false, submitted: true}));

      };

          setView('admin');
          setStatus(s => ({...s, error: ''}));
        } catch (e) { setStatus(s => ({...s, error: 'Erro ao carregar dados'})); }
      };
