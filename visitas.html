<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interesse: Visitas Técnicas 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp };
  </script>
  
  <style>
    .visit-bg { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); }
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    * { color: #1f2937; }
    input { font-weight: 700 !important; }
  </style>
</head>
<body class="visit-bg min-h-screen antialiased p-4 sm:p-8">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MEU_FIREBASE = {
      apiKey: "AIzaSyCCJ4oxrd9d_C9JeJPvWeUKhmhPeU92gKg",
      authDomain: "formulario-escola-tecnico.firebaseapp.com",
      projectId: "formulario-escola-tecnico",
      storageBucket: "formulario-escola-tecnico.firebasestorage.app",
      messagingSenderId: "212303991437",
      appId: "1:212303991437:web:a17de2c0ac4e9ed1de88c4"
    };

    function App() {
      const [view, setView] = useState('form');
      const [status, setStatus] = useState({ loading: false, error: '', submitted: false });
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [responses, setResponses] = useState([]);
      const [adminPass, setAdminPass] = useState("");

      const [formData, setFormData] = useState({
        nome: '',
        curso: '',
        interesseTranbrasa: '',
        interesseUsina: ''
      });

      useEffect(() => {
        const init = async () => {
          if (!window.FirebaseLib) { setTimeout(init, 500); return; }
          const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseLib;
          try {
            const app = initializeApp(MEU_FIREBASE);
            const auth = getAuth(app);
            const firestore = getFirestore(app);
            setDb(firestore);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, setUser);
          } catch (e) { setStatus(s => ({...s, error: 'Erro de conexão.'})); }
        };
        init();
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.curso || !formData.interesseTranbrasa || !formData.interesseUsina) {
          setStatus(s => ({...s, error: 'Preencha todos os campos obrigatórios.'}));
          return;
        }
        setStatus(s => ({...s, loading: true, error: ''}));
        try {
          const { addDoc, collection, serverTimestamp } = window.FirebaseLib;
          await addDoc(collection(db, 'visitas_tecnicas'), {
            ...formData,
            timestamp: serverTimestamp()
          });
          setStatus(s => ({...s, loading: false, submitted: true}));
        } catch (e) { setStatus(s => ({...s, loading: false, error: 'Erro ao enviar.'})); }
      };

      const loginAdmin = async () => {
        if (adminPass !== "PAEETCEL") { setStatus(s => ({...s, error: 'Senha incorreta'})); return; }
        try {
          const { collection, getDocs } = window.FirebaseLib;
          const snap = await getDocs(collection(db, 'visitas_tecnicas'));
          setResponses(snap.docs.map(d => ({...d.data(), id: d.id})));
          setView('admin');
          setStatus(s => ({...s, error: ''}));
        } catch (e) { setStatus(s => ({...s, error: 'Erro ao carregar dados'})); }
      };

      if (status.submitted) return (
        <div className="max-w-md mx-auto glass rounded-3xl p-10 text-center animate-in shadow-2xl mt-20">
          <h2 className="text-3xl font-black mb-4">Registado! ✅</h2>
          <p className="font-bold opacity-70 mb-8">Obrigado por demonstrares o teu interesse nas visitas técnicas.</p>
          <button onClick={() => window.location.reload()} className="w-full py-4 bg-emerald-600 text-white font-black rounded-xl uppercase">Nova Resposta</button>
        </div>
      );

      if (view === 'admin') return (
        <div className="max-w-5xl mx-auto glass rounded-3xl p-6 shadow-2xl animate-in">
          <div className="flex justify-between items-center mb-8 border-b-2 border-emerald-100 pb-4">
            <h2 className="text-2xl font-black uppercase tracking-tighter">Relatório de Visitas</h2>
            <button onClick={() => setView('form')} className="bg-black text-white px-6 py-2 rounded-lg font-bold text-xs">VOLTAR</button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead>
                <tr className="bg-emerald-50 text-[10px] uppercase font-black">
                  <th className="p-3">Nome do Aluno</th>
                  <th className="p-3">Curso</th>
                  <th className="p-3">Tranbrasa (Santos)</th>
                  <th className="p-3">Usina Vista Alegre</th>
                </tr>
              </thead>
              <tbody className="text-sm">
                {responses.map(r => (
                  <tr key={r.id} className="border-b border-emerald-50 font-bold">
                    <td className="p-3 uppercase">{r.nome}</td>
                    <td className="p-3">{r.curso}</td>
                    <td className={`p-3 ${r.interesseTranbrasa === 'SIM' ? 'text-emerald-600' : 'text-red-400'}`}>{r.interesseTranbrasa}</td>
                    <td className={`p-3 ${r.interesseUsina === 'SIM' ? 'text-emerald-600' : 'text-red-400'}`}>{r.interesseUsina}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );

      return (
        <div className="max-w-xl mx-auto space-y-6">
          <div className="text-center text-white mb-8">
            <h1 className="text-4xl font-black uppercase tracking-tighter leading-none">Visitas Técnicas 2026</h1>
            <p className="font-bold opacity-80 mt-2">Levantamento de Interesse dos Alunos</p>
          </div>

          <form onSubmit={handleSubmit} className="glass rounded-[2.5rem] p-8 sm:p-12 shadow-2xl animate-in space-y-8 border border-white/50">
            <div className="space-y-4">
              <label className="text-[10px] font-black uppercase tracking-widest opacity-50 block ml-2">Identificação</label>
              <input 
                type="text" placeholder="Nome Completo *" required 
                className="w-full p-4 rounded-2xl border-2 border-emerald-100 outline-none focus:border-emerald-500 transition-all uppercase"
                onChange={e => setFormData({...formData, nome: e.target.value})}
              />
              
              <div className="grid grid-cols-2 gap-3 mt-4">
                {['ADM', 'AGRO'].map(c => (
                  <button 
                    type="button" key={c}
                    className={`p-4 rounded-2xl border-2 font-black transition-all ${formData.curso === c ? 'bg-emerald-600 border-emerald-600 text-white' : 'bg-white border-emerald-100 hover:bg-emerald-50'}`}
                    onClick={() => setFormData({...formData, curso: c})}
                  >Curso {c}</button>
                ))}
              </div>
            </div>

            <div className="space-y-6">
              <div className="p-6 bg-emerald-50 rounded-3xl space-y-4">
                <h3 className="font-black text-sm uppercase tracking-tight">1. Visita Tranbrasa (Santos)</h3>
                <div className="flex gap-2">
                  {['SIM', 'NÃO'].map(opt => (
                    <button 
                      type="button" key={opt}
                      className={`flex-1 p-3 rounded-xl border-2 font-black text-xs transition-all ${formData.interesseTranbrasa === opt ? 'bg-black border-black text-white' : 'bg-white border-emerald-200'}`}
                      onClick={() => setFormData({...formData, interesseTranbrasa: opt})}
                    >{opt}</button>
                  ))}
                </div>
              </div>

              <div className="p-6 bg-emerald-50 rounded-3xl space-y-4">
                <h3 className="font-black text-sm uppercase tracking-tight">2. Usina Vista Alegre (Itapetininga)</h3>
                <div className="flex gap-2">
                  {['SIM', 'NÃO'].map(opt => (
                    <button 
                      type="button" key={opt}
                      className={`flex-1 p-3 rounded-xl border-2 font-black text-xs transition-all ${formData.interesseUsina === opt ? 'bg-black border-black text-white' : 'bg-white border-emerald-200'}`}
                      onClick={() => setFormData({...formData, interesseUsina: opt})}
                    >{opt}</button>
                  ))}
                </div>
              </div>
            </div>

            {status.error && <p className="text-red-500 font-bold text-center text-xs">{status.error}</p>}

            <button 
              type="submit" disabled={status.loading}
              className="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white text-xl font-black rounded-2xl shadow-xl uppercase transition-all active:scale-95"
            >
              {status.loading ? 'A enviar...' : 'Registar Interesse'}
            </button>
          </form>

          <div className="text-center">
            <button onClick={() => setView('login')} className="text-white/40 font-black text-[10px] uppercase tracking-widest hover:text-white transition-colors">Acesso Administrativo</button>
            {view === 'login' && (
              <div className="mt-4 p-4 glass rounded-2xl animate-in max-w-xs mx-auto">
                <input 
                  type="password" placeholder="Senha" 
                  className="w-full p-2 rounded-lg border border-emerald-200 mb-2 text-center text-xs"
                  onChange={e => setAdminPass(e.target.value)}
                />
                <button onClick={loginAdmin} className="w-full py-2 bg-black text-white rounded-lg font-bold text-[10px] uppercase">Entrar</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
