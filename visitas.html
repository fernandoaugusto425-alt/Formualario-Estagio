<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interesse: Visitas Técnicas 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp };
  </script>
  
  <style>
    .bg-split-left {
      position: fixed; top: 0; left: 0; width: 100%; height: 50%; z-index: -1;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('./bg_tranbrasa.jpg') center/cover no-repeat;
      background-color: #064e3b; 
    }
    .bg-split-right {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 50%; z-index: -1;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('./bg_usina.jpg') center/cover no-repeat;
      background-color: #059669; 
    }
    
    @media (min-width: 640px) {
      .bg-split-left { width: 50%; height: 100%; }
      .bg-split-right { top: 0; left: 50%; width: 50%; height: 100%; }
    }

    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    * { color: #1f2937; }
    input { font-weight: 700 !important; }
    .course-logo { width: 80px; height: 80px; object-contain; margin-bottom: 12px; }
    .company-logo { width: 48px; height: 48px; object-contain; background: white; border-radius: 12px; padding: 4px; border: 1px solid #e5e7eb; display: none; }
  </style>
</head>
<body class="min-h-screen antialiased p-4 sm:p-8 relative">
  
  <div class="bg-split-left"></div>
  <div class="bg-split-right"></div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MEU_FIREBASE = {
      apiKey: "AIzaSyCCJ4oxrd9d_C9JeJPvWeUKhmhPeU92gKg",
      authDomain: "formulario-escola-tecnico.firebaseapp.com",
      projectId: "formulario-escola-tecnico",
      storageBucket: "formulario-escola-tecnico.firebasestorage.app",
      messagingSenderId: "212303991437",
      appId: "1:212303991437:web:a17de2c0ac4e9ed1de88c4"
    };

    const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>;

    function App() {
      const [view, setView] = useState('form');
      const [status, setStatus] = useState({ loading: false, error: '', submitted: false });
      const [db, setDb] = useState(null);
      const [user, setUser] = useState(null);
      const [responses, setResponses] = useState([]);
      const [adminPass, setAdminPass] = useState("");
      const [deletingId, setDeletingId] = useState(null);

      const [formData, setFormData] = useState({
        nome: '',
        curso: '',
        interesseTranbrasa: '',
        interesseUsina: ''
      });

      useEffect(() => {
        const init = async () => {
          if (!window.FirebaseLib) { setTimeout(init, 500); return; }
          const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseLib;
          try {
            const app = initializeApp(MEU_FIREBASE);
            const auth = getAuth(app);
            const firestore = getFirestore(app);
            setDb(firestore);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, setUser);
          } catch (e) { setStatus(s => ({...s, error: 'Erro de conexão.'})); }
        };
        init();
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.curso || !formData.interesseTranbrasa || !formData.interesseUsina) {
          setStatus(s => ({...s, error: 'Preencha todos os campos obrigatórios.'}));
          return;
        }
        setStatus(s => ({...s, loading: true, error: ''}));
        try {
          const { addDoc, collection, serverTimestamp } = window.FirebaseLib;
          await addDoc(collection(db, 'visitas_tecnicas'), {
            ...formData,
            timestamp: serverTimestamp()
          });
          setStatus(s => ({...s, loading: false, submitted: true}));
        } catch (e) { setStatus(s => ({...s, loading: false, error: 'Erro ao enviar.'})); }
      };

      const loginAdmin = async () => {
        if (adminPass !== "PAEETCEL") { setStatus(s => ({...s, error: 'Senha incorreta'})); return; }
        try {
          const { collection, getDocs } = window.FirebaseLib;
          const snap = await getDocs(collection(db, 'visitas_tecnicas'));
          const data = snap.docs.map(d => ({...d.data(), id: d.id}));
          // Ordenar pelas respostas mais recentes (opcional, mas recomendado)
          data.sort((a, b) => b.timestamp - a.timestamp);
          setResponses(data);
          setView('admin');
          setStatus(s => ({...s, error: ''}));
        } catch (e) { setStatus(s => ({...s, error: 'Erro ao carregar dados'})); }
      };

      const handleDelete = async (id) => {
        try {
          const { deleteDoc, doc } = window.FirebaseLib;
          await deleteDoc(doc(db, 'visitas_tecnicas', id));
          setResponses(responses.filter(r => r.id !== id));
          setDeletingId(null);
        } catch (err) { setStatus(s => ({...s, error: 'Erro ao apagar registo.'})); }
      };

      const exportCSV = () => {
        const tranbrasaSim = responses.filter(r => r.interesseTranbrasa === 'SIM').length;
        const tranbrasaNao = responses.filter(r => r.interesseTranbrasa === 'NÃO').length;
        const usinaSim = responses.filter(r => r.interesseUsina === 'SIM').length;
        const usinaNao = responses.filter(r => r.interesseUsina === 'NÃO').length;

        const headers = "Nome do Aluno;Curso;Visita Tranbrasa (Santos);Visita Usina Vista Alegre\n";
        const rows = responses.map(r => `"${r.nome}";"${r.curso}";"${r.interesseTranbrasa}";"${r.interesseUsina}"`).join("\n");
        const summary = `\n\n"--- RESUMO DE INTERESSES ---";"";"";""\n"TOTAL DE 'SIM'";"";"${tranbrasaSim}";"${usinaSim}"\n"TOTAL DE 'NÃO'";"";"${tranbrasaNao}";"${usinaNao}"`;

        const blob = new Blob(["\uFEFF" + headers + rows + summary], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "relatorio_visitas_tecnicas_2026.csv");
        link.click();
      };

      if (status.submitted) return (
        <div className="max-w-md mx-auto glass rounded-3xl p-10 text-center animate-in shadow-2xl mt-20 border border-white/50">
          <h2 className="text-3xl font-black mb-4">Registado! ✅</h2>
          <p className="font-bold opacity-70 mb-8">Obrigado por demonstrares o teu interesse nas visitas técnicas.</p>
          <button onClick={() => window.location.reload()} className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-xl uppercase transition-all">Nova Resposta</button>
        </div>
      );

      if (view === 'admin') {
        const tranbrasaSim = responses.filter(r => r.interesseTranbrasa === 'SIM').length;
        const tranbrasaNao = responses.filter(r => r.interesseTranbrasa === 'NÃO').length;
        const usinaSim = responses.filter(r => r.interesseUsina === 'SIM').length;
        const usinaNao = responses.filter(r => r.interesseUsina === 'NÃO').length;

        return (
          <div className="max-w-5xl mx-auto glass rounded-3xl p-6 shadow-2xl animate-in border border-white/50">
            <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 border-b-2 border-emerald-100 pb-4">
              <h2 className="text-2xl font-black uppercase tracking-tighter">Relatório de Visitas</h2>
              <div className="flex gap-2">
                <button onClick={exportCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-black text-xs shadow-md transition-all active:scale-95">EXPORTAR EXCEL</button>
                <button onClick={() => setView('form')} className="bg-black text-white px-6 py-2 rounded-lg font-bold text-xs transition-all active:scale-95">VOLTAR</button>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
              <div className="bg-emerald-50/50 p-4 rounded-xl shadow-inner border border-emerald-100 flex flex-col justify-center">
                <h3 className="font-black text-xs uppercase text-emerald-900 mb-2">Resumo: Tranbrasa (Santos)</h3>
                <div className="flex justify-around font-black text-sm">
                  <span className="text-emerald-700 bg-white px-4 py-2 rounded-lg shadow-sm border border-emerald-100">SIM: {tranbrasaSim}</span>
                  <span className="text-red-500 bg-white px-4 py-2 rounded-lg shadow-sm border border-red-50">NÃO: {tranbrasaNao}</span>
                </div>
              </div>
              <div className="bg-emerald-50/50 p-4 rounded-xl shadow-inner border border-emerald-100 flex flex-col justify-center">
                <h3 className="font-black text-xs uppercase text-emerald-900 mb-2">Resumo: Usina Vista Alegre</h3>
                <div className="flex justify-around font-black text-sm">
                  <span className="text-emerald-700 bg-white px-4 py-2 rounded-lg shadow-sm border border-emerald-100">SIM: {usinaSim}</span>
                  <span className="text-red-500 bg-white px-4 py-2 rounded-lg shadow-sm border border-red-50">NÃO: {usinaNao}</span>
                </div>
              </div>
            </div>

            <div className="overflow-x-auto bg-white rounded-xl shadow-sm border border-emerald-50">
              <table className="w-full text-left">
                <thead>
                  <tr className="bg-emerald-50 text-[10px] uppercase font-black">
                    <th className="p-3">Nome do Aluno</th>
                    <th className="p-3">Curso</th>
                    <th className="p-3">Tranbrasa (Santos)</th>
                    <th className="p-3">Usina Vista Alegre</th>
                    <th className="p-3 text-center">Ação</th>
                  </tr>
                </thead>
                <tbody className="text-sm">
                  {responses.map(r => (
                    <tr key={r.id} className="border-b border-emerald-50 font-bold hover:bg-slate-50">
                      <td className="p-3 uppercase">{r.nome}</td>
                      <td className="p-3 text-emerald-900">{r.curso}</td>
                      <td className={`p-3 ${r.interesseTranbrasa === 'SIM' ? 'text-emerald-600' : 'text-red-400'}`}>{r.interesseTranbrasa}</td>
                      <td className={`p-3 ${r.interesseUsina === 'SIM' ? 'text-emerald-600' : 'text-red-400'}`}>{r.interesseUsina}</td>
                      <td className="p-3 text-center">
                        {deletingId === r.id ? (
                          <div className="flex gap-1 justify-center animate-pop">
                            <button onClick={() => handleDelete(r.id)} className="bg-red-600 text-white p-1 rounded font-black text-[8px] uppercase">Apagar</button>
                            <button onClick={() => setDeletingId(null)} className="bg-slate-300 p-1 rounded text-[8px] font-black uppercase text-black">Não</button>
                          </div>
                        ) : (
                          <button onClick={() => setDeletingId(r.id)} className="text-red-500 hover:text-red-700 p-1 transition-transform hover:scale-125">
                            <IconTrash />
                          </button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {responses.length === 0 && <div className="p-10 text-center font-black opacity-30 italic">Nenhum interesse registado ainda.</div>}
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-xl mx-auto space-y-6 relative z-10">
          <div className="text-center text-white mb-8 drop-shadow-lg">
            <h1 className="text-4xl font-black uppercase tracking-tighter leading-none text-white">Visitas Técnicas 2026</h1>
            <p className="font-bold text-white opacity-90 mt-2">Levantamento de Interesse dos Alunos</p>
          </div>

          <form onSubmit={handleSubmit} className="glass rounded-[2.5rem] p-8 sm:p-12 shadow-2xl animate-in space-y-10 border border-white/50">
            <div className="space-y-4">
              <label className="text-[10px] font-black uppercase tracking-widest opacity-50 block ml-2">Identificação</label>
              <input 
                type="text" placeholder="Nome Completo *" required 
                className="w-full p-4 rounded-2xl border-2 border-emerald-100 outline-none focus:border-emerald-500 transition-all uppercase shadow-inner bg-white/80 focus:bg-white"
                onChange={e => setFormData({...formData, nome: e.target.value})}
              />
              
              <div className="grid grid-cols-2 gap-4 mt-6">
                {[
                  {id: 'ADM', label: 'Administração', img: './logo_adm.png'},
                  {id: 'AGRO', label: 'Agronegócio', img: './logo_agro.png'}
                ].map(c => (
                  <button 
                    type="button" key={c.id}
                    className={`p-6 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-95 ${formData.curso === c.id ? 'bg-emerald-600 border-emerald-600 text-white shadow-lg scale-105' : 'bg-white border-emerald-100 hover:bg-emerald-50 hover:border-emerald-200'}`}
                    onClick={() => setFormData({...formData, curso: c.id})}
                  >
                    <img 
                      src={c.img} alt={c.label} 
                      className="course-logo" 
                      onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    <span className={`font-black text-sm uppercase tracking-tight ${formData.curso === c.id ? 'text-white' : 'text-emerald-900'}`}>Curso {c.id}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="space-y-8">
              <div className="p-6 bg-emerald-50/80 rounded-3xl space-y-5 shadow-inner border border-emerald-100">
                <div className="flex items-center gap-3">
                  <img 
                    src="./logo_tranbrasa.png" alt="Tranbrasa Santos" 
                    className="company-logo"
                    onLoad={(e) => { e.target.style.display = 'block'; }}
                    onError={(e) => { e.target.style.display = 'none'; }}
                  />
                  <h3 className="font-black text-sm uppercase tracking-tight text-emerald-950 flex-1">1. Visita Tranbrasa (Santos)</h3>
                </div>
                <div className="flex gap-3">
                  {['SIM', 'NÃO'].map(opt => (
                    <button 
                      type="button" key={opt}
                      className={`flex-1 p-4 rounded-xl border-2 font-black text-xs uppercase tracking-widest transition-all ${formData.interesseTranbrasa === opt ? 'bg-black border-black text-white shadow-lg' : 'bg-white border-emerald-200 hover:border-emerald-300'}`}
                      onClick={() => setFormData({...formData, interesseTranbrasa: opt})}
                    >{opt}</button>
                  ))}
                </div>
              </div>

              <div className="p-6 bg-emerald-50/80 rounded-3xl space-y-5 shadow-inner border border-emerald-100">
                <div className="flex items-center gap-3">
                  <img 
                    src="./logo_usina.png" alt="Usina Vista Alegre" 
                    className="company-logo"
                    onLoad={(e) => { e.target.style.display = 'block'; }}
                    onError={(e) => { e.target.style.display = 'none'; }}
                  />
                  <h3 className="font-black text-sm uppercase tracking-tight text-emerald-950 flex-1">2. Usina Vista Alegre (Itapetininga)</h3>
                </div>
                <div className="flex gap-3">
                  {['SIM', 'NÃO'].map(opt => (
                    <button 
                      type="button" key={opt}
                      className={`flex-1 p-4 rounded-xl border-2 font-black text-xs uppercase tracking-widest transition-all ${formData.interesseUsina === opt ? 'bg-black border-black text-white shadow-lg' : 'bg-white border-emerald-200 hover:border-emerald-300'}`}
                      onClick={() => setFormData({...formData, interesseUsina: opt})}
                    >{opt}</button>
                  ))}
                </div>
              </div>
            </div>

            {status.error && <p className="text-red-500 font-bold text-center text-xs bg-red-50 p-3 rounded-lg border border-red-200 animate-pop">{status.error}</p>}

            <button 
              type="submit" disabled={status.loading}
              className="w-full py-6 bg-emerald-600 hover:bg-emerald-700 text-white text-2xl font-black rounded-3xl shadow-xl uppercase transition-all flex items-center justify-center active:scale-95 disabled:opacity-50"
            >
              {status.loading ? <span className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mr-3"></span> : null}
              {status.loading ? 'A registar...' : 'Registar Interesse'}
            </button>
          </form>

          <div className="text-center pt-8 pb-4">
            <button onClick={() => setView('login')} className="text-white/70 font-black text-[10px] uppercase tracking-widest hover:text-white transition-colors drop-shadow-md">Acesso Administrativo</button>
            {view === 'login' && (
              <div className="mt-4 p-5 glass rounded-2xl animate-in max-w-xs mx-auto border border-white/50 shadow-2xl">
                <input 
                  type="password" placeholder="Senha" 
                  className="w-full p-3 rounded-xl border border-emerald-200 mb-3 text-center text-xs shadow-inner bg-white/80 focus:bg-white"
                  onChange={e => setAdminPass(e.target.value)}
                />
                <button onClick={loginAdmin} className="w-full py-3 bg-black text-white rounded-xl font-bold text-[10px] uppercase tracking-widest active:scale-95">Entrar</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
